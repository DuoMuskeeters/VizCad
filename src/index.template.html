<!DOCTYPE html>
<html lang="{{LANG}}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/vizcad-logo.ico" />
    <meta name="theme-color" content="#000000" />

    <!-- Google Search Console Verification -->
    <meta name="google-site-verification" content="bzi8-Oqun8ymOf361vRE0sWI55uSWzTJrXHFgFJn3ug" />

    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" sizes="180x180" href="/vizcad-logo-192.png" />

    <!-- Additional Icon Sizes -->
    <link rel="icon" type="image/png" sizes="32x32" href="/vizcad-logo-64.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/vizcad-logo.png" />

    <!-- Sitemap -->
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />

    <!-- Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Dynamic Meta Tags (SSR) -->
    {{META_TAGS}}
    
    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": ["SoftwareApplication", "WebApplication"],
      "name": "VizCad",
      "applicationCategory": "CAD Software",
      "applicationSubCategory": "3D Modeling",
      "operatingSystem": "Web Browser",
      "description": "Professional CAD design and 3D modeling services for architecture, engineering, and manufacturing projects.",
      "url": "https://vizcad.com",
      "author": {
        "@type": "Organization",
        "name": "VizCad",
        "url": "https://vizcad.com"
      },
      "offers": {
        "@type": "Offer",
        "description": "Professional CAD Design Services"
      },
      "featureList": [
        "3D Modeling",
        "CAD Design",
        "Technical Drawing", 
        "3D Visualization",
        "File Format Conversion"
      ]
    }
    </script>

    <!-- Global site tag (gtag.js) - Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-7DM9K53WE0"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-7DM9K53WE0');
    </script>
    
    <!-- SSR Styles -->
    {{SSR_STYLES}}
  </head>
  <body>
    <div id="app" data-ssr>{{SSR_CONTENT}}</div>
    
    <!-- SSR Detection Flag -->
    <script>
      window.__VIZCAD_SSR__ = true;
    </script>
    
    <!-- Client Entry Point -->
    <script type="module" src="/src/entry.client.tsx"></script>
  </body>
</html>
